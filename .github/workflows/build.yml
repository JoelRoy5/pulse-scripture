name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build Pulse (no signing)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Secrets stub
        run: |
          cat > Pulse/Pulse/Secrets.swift << 'EOF'
          enum Secrets {
              static let glooAPIKey = ""
              static let youVersionAPIKey = ""
          }
          EOF

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build
        run: |
          xcodebuild build \
            -project Pulse/Pulse.xcodeproj \
            -scheme Pulse \
            -destination 'platform=iOS Simulator,name=iPhone 16e' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || xcodebuild build \
              -project Pulse/Pulse.xcodeproj \
              -scheme Pulse \
              -destination 'generic/platform=iOS Simulator' \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO
